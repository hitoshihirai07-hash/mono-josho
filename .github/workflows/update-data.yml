name: Update ranking data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * *"
    - cron: "0 4 * * *"
    - cron: "0 11 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_SCHEDULED_UPDATE == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run fetch:rakuten
        env:
          RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          RAKUTEN_GENRE_ID: ${{ vars.RAKUTEN_GENRE_ID }}
      - run: npm run generate:editorial
      - run: npm run generate:posts
      - run: npm run build
      - name: Commit updated data
        run: |
          git config user.name "mono-josho-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data
          git diff --cached --quiet || git commit -m "chore: update ranking data"
          git push
